name: format

on:
  workflow_call:

permissions:
  contents: read

jobs:
  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install formatters
        run: |
          go install mvdan.cc/gofumpt@latest
          go install github.com/daixiang0/gci@latest

      - name: Run gofumpt
        run: gofumpt -w .

      - name: Run gci
        run: gci write .

      - name: Check for changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Run 'just fmt' locally."
            git diff
            exit 1
          fi
